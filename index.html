<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🍪 Dessert Run Witch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════ START SCREEN ══════════════ -->
<div id="startScreen" class="screen active">
  <div class="screen-deco deco1"></div>
  <div class="screen-deco deco2"></div>
  <div class="screen-deco deco3"></div>
  <div class="screen-content">
    <div class="floating-cookies">
      <span>🍪</span><span>🍩</span><span>🧁</span><span>🍭</span><span>🍫</span>
    </div>
    <div class="title-block">
      <div class="title-icon">🍪</div>
      <h1 class="title-main">Dessert Run</h1>
      <h2 class="title-sub">W I T C H</h2>
      <p class="title-desc">마녀를 피해 디저트를 모아라!</p>
    </div>
    <div class="best-display">🏆 최고기록: <span id="startBest">0</span></div>
    <button id="startBtn" class="btn-main">▶ 게임 시작</button>
    <div class="controls-hint">
      <div class="hint-row">
        <kbd>← →</kbd><span>레인 이동</span>
        <kbd>↑</kbd><span>점프</span>
        <kbd>↓</kbd><span>슬라이드</span>
      </div>
      <div class="hint-row">📱 스와이프로도 조작 가능</div>
    </div>
  </div>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="gameScreen" class="screen">
  <div id="game">
    <!-- 배경 캔버스 -->
    <canvas id="bgCanvas"></canvas>
    <!-- 이펙트 캔버스 -->
    <canvas id="fxCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div class="hud-block">
          <span class="hud-label">SCORE</span>
          <span id="score" class="hud-value">0</span>
        </div>
        <div class="hud-block">
          <span class="hud-label">🪙 COIN</span>
          <span id="coins" class="hud-value">0</span>
        </div>
      </div>
      <div class="hud-right">
        <div class="hud-block">
          <span class="hud-label">BEST</span>
          <span id="best" class="hud-value">0</span>
        </div>
      </div>
    </div>

    <!-- 아이템 표시 -->
    <div id="itemDisplay"></div>

    <!-- 레인 -->
    <div id="lanes">
      <div class="lane"></div>
      <div class="lane"></div>
      <div class="lane"></div>
    </div>

    <!-- 지면 -->
    <div id="ground">
      <div id="groundScroll"></div>
    </div>

    <!-- 플레이어 캔버스 -->
    <canvas id="playerCanvas" width="64" height="80"></canvas>

    <!-- 추격자 캔버스 -->
    <canvas id="chaserCanvas" width="72" height="72"></canvas>

    <!-- 오브젝트 컨테이너 -->
    <div id="objects"></div>

    <!-- 피격 오버레이 -->
    <div id="hitOverlay"></div>
  </div>
</div>

<!-- ══════════════ GAME OVER SCREEN ══════════════ -->
<div id="gameoverScreen" class="screen">
  <div class="screen-deco deco1"></div>
  <div class="screen-deco deco2"></div>
  <div class="screen-content gameover-content">
    <div class="go-icon">💀</div>
    <h1 class="go-title">GAME OVER</h1>
    <div class="go-stats">
      <div class="go-stat-row">
        <span class="go-label">점수</span>
        <span id="goScore" class="go-value">0</span>
      </div>
      <div class="go-stat-row">
        <span class="go-label">🪙 코인</span>
        <span id="goCoins" class="go-value">0</span>
      </div>
      <div class="go-stat-row best-row">
        <span class="go-label">🏆 최고기록</span>
        <span id="goBest" class="go-value">0</span>
      </div>
    </div>
    <div id="newRecord" class="new-record hidden">🎉 NEW RECORD!</div>
    <div class="go-buttons">
      <button id="retryBtn" class="btn-main">🔄 다시 하기</button>
      <button id="homeBtn" class="btn-sub">🏠 홈으로</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
